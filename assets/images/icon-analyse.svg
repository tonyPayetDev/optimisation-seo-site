<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" fill="none">
  <!-- Magnifying glass handle -->
  <line x1="31.5" y1="31.5" x2="43" y2="43" stroke="#0056b3" stroke-width="3" stroke-linecap="round"/>
  <!-- Magnifying glass circle -->
  <circle cx="20" cy="20" r="13" stroke="#0056b3" stroke-width="2.5" fill="#e8f0ff"/>
  <!-- Chart bars inside the lens -->
  <rect x="12" y="22" width="3.5" height="5" rx="1" fill="#0056b3" opacity="0.7"/>
  <rect x="17.5" y="18" width="3.5" height="9" rx="1" fill="#0056b3"/>
  <rect x="23" y="14" width="3.5" height="13" rx="1" fill="#0056b3" opacity="0.85"/>
  <!-- Trending line -->
  <polyline points="12,23 17.5,19 23,15 27,12" stroke="#f0ad4e" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  <!-- Arrow tip -->
  <circle cx="27" cy="12" r="1.5" fill="#f0ad4e"/>
</svg>
