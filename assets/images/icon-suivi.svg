<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" fill="none">
  <!-- Chart bars -->
  <rect x="6" y="30" width="8" height="12" rx="2" fill="#e8f0ff" stroke="#0056b3" stroke-width="2"/>
  <rect x="20" y="20" width="8" height="22" rx="2" fill="#e8f0ff" stroke="#0056b3" stroke-width="2"/>
  <rect x="34" y="12" width="8" height="30" rx="2" fill="#0056b3" stroke="#0056b3" stroke-width="1"/>
  <!-- Trending line -->
  <polyline points="10,28 24,18 38,10" stroke="#ff6600" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Dots on line -->
  <circle cx="10" cy="28" r="3" fill="#ff6600"/>
  <circle cx="24" cy="18" r="3" fill="#ff6600"/>
  <circle cx="38" cy="10" r="3" fill="#ff6600"/>
  <!-- Base line -->
  <line x1="4" y1="44" x2="44" y2="44" stroke="#0056b3" stroke-width="2" stroke-linecap="round"/>
</svg>
