<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" fill="none">
  <!-- Central node -->
  <circle cx="24" cy="24" r="6" fill="#0056b3" stroke="#0056b3" stroke-width="1"/>
  <circle cx="24" cy="24" r="3" fill="#e8f0ff"/>

  <!-- Satellite nodes -->
  <circle cx="8" cy="16" r="5" fill="#e8f0ff" stroke="#0056b3" stroke-width="2"/>
  <circle cx="40" cy="12" r="5" fill="#e8f0ff" stroke="#0056b3" stroke-width="2"/>
  <circle cx="40" cy="36" r="5" fill="#e8f0ff" stroke="#0056b3" stroke-width="2"/>
  <circle cx="10" cy="38" r="5" fill="#e8f0ff" stroke="#0056b3" stroke-width="2"/>

  <!-- Connection lines -->
  <line x1="13" y1="16" x2="19" y2="22" stroke="#0056b3" stroke-width="2" stroke-linecap="round" opacity="0.6"/>
  <line x1="35" y1="14" x2="28" y2="20" stroke="#0056b3" stroke-width="2" stroke-linecap="round" opacity="0.6"/>
  <line x1="35" y1="34" x2="29" y2="28" stroke="#0056b3" stroke-width="2" stroke-linecap="round" opacity="0.6"/>
  <line x1="15" y1="36" x2="20" y2="29" stroke="#0056b3" stroke-width="2" stroke-linecap="round" opacity="0.6"/>

  <!-- Link chain icon overlay top-right -->
  <g transform="translate(28, 5) rotate(-40)">
    <!-- Link 1 -->
    <rect x="0" y="0" width="10" height="6" rx="3" fill="#ff6600" stroke="#0056b3" stroke-width="1.2"/>
    <!-- Link 2 -->
    <rect x="6" y="2" width="10" height="6" rx="3" fill="#ff6600" stroke="#0056b3" stroke-width="1.2"/>
  </g>

  <!-- Small dot accents on connections -->
  <circle cx="16" cy="19" r="1.5" fill="#ff6600"/>
  <circle cx="32" cy="17" r="1.5" fill="#ff6600"/>
  <circle cx="32" cy="31" r="1.5" fill="#ff6600"/>
  <circle cx="17" cy="33" r="1.5" fill="#ff6600"/>
</svg>
