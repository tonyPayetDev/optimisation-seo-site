  <rect x="6" y="4" width="28" height="36" rx="3" fill="#e8f0ff" stroke="#0056b3" stroke-width="2"/>
  <!-- Dog-ear fold -->
  <path d="M26 4 L34 12" stroke="#0056b3" stroke-width="2" stroke-linecap="round"/>
  <path d="M26 4 L26 12 L34 12" fill="#c0d8ff" stroke="#0056b3" stroke-width="1.5" stroke-linejoin="round"/>
  <!-- Text lines -->
  <line x1="11" y1="18" x2="25" y2="18" stroke="#0056b3" stroke-width="2" stroke-linecap="round" opacity="0.5"/>
  <line x1="11" y1="23" x2="29" y2="23" stroke="#0056b3" stroke-width="2" stroke-linecap="round" opacity="0.5"/>
  <line x1="11" y1="28" x2="22" y2="28" stroke="#0056b3" stroke-width="2" stroke-linecap="round" opacity="0.5"/>
  <!-- Pencil -->
  <g transform="rotate(-40, 36, 34)">
    <rect x="31" y="26" width="7" height="16" rx="1" fill="#0056b3"/>
    <polygon points="31,42 38,42 34.5,47" fill="#f0ad4e"/>
